name: Build & Push image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # firefly's ops deploy pulls `:latest` on its next run (weekly cron, on any
      # ops push, or a manual `gh workflow run deploy.yml -R <owner>/ops`).
      # Uncomment to auto-trigger it here — needs a PAT with Actions:write on ops.
      # - name: Trigger firefly deploy
      #   if: github.ref == 'refs/heads/main'
      #   env:
      #     GH_TOKEN: ${{ secrets.OPS_DISPATCH_TOKEN }}
      #   run: gh workflow run deploy.yml -R <owner>/ops
