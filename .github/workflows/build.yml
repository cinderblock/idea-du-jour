name: Build & Push image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Push-to-deploy: once the new image is published, trigger firefly's ops
      # deploy so it pulls the fresh :latest (the stack pattern doesn't auto-pull
      # on an app-repo push). Needs a fine-grained PAT with Actions: read/write on
      # cinderblock/ops, stored as the idj repo secret OPS_DISPATCH_TOKEN. Skips
      # cleanly (doesn't fail the build) when the secret isn't set.
      - name: Trigger firefly deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.OPS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "OPS_DISPATCH_TOKEN not set — skipping auto-deploy."
            echo "Deploy manually with: gh workflow run deploy.yml -R cinderblock/ops"
            exit 0
          fi
          gh workflow run deploy.yml -R cinderblock/ops
          echo "Dispatched firefly deploy (ops)."
