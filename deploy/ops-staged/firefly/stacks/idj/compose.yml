# idea-du-jour — ops-managed stack on firefly. Deployed by servers/firefly/deploy.sh
# (docker compose pull + up per stack). Loopback-published; Caddy (network_mode:
# host) reverse-proxies https://idj.isozilla.com -> 127.0.0.1:18787.
#
# Env comes from .env, generated by deploy.sh from ./env.json (SESSION_SECRET is
# auto-generated + persisted; the rest have defaults). Enrichment is intentionally
# OFF in prod (no ANTHROPIC_API_KEY) — the triage skill on the Max plan is the
# primary processing path. To enable it, add ANTHROPIC_API_KEY to env.json + set
# FIREFLY_ANTHROPIC_API_KEY, and add it to the environment block below.
services:
  idj:
    image: ghcr.io/cinderblock/idea-du-jour:latest
    container_name: idj
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      RP_ID: ${RP_ID}
      RP_ORIGIN: ${RP_ORIGIN}
      RP_NAME: ${RP_NAME}
      ENRICH_MODEL: ${ENRICH_MODEL}
    volumes:
      # Append-only SQLite log + projection. The one piece of durable state.
      - data:/data
    ports:
      # Host loopback only — Caddy proxies to this. NEVER expose publicly; that
      # would bypass Caddy's TLS termination.
      - '127.0.0.1:18787:3000'
    healthcheck:
      test:
        - CMD
        - bun
        - -e
        - fetch('http://127.0.0.1:3000/api/auth/me').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  data:
